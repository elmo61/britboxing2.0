<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Direction A — Fight Bill</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --uj-red:#cf142b; --uj-blue:#012169; --ink:#0a0a0c; --cream:#f4efe6;
    --gold:#e8b84b; --muted:#9a958c; --line:#26242a;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--ink);color:var(--cream);
    font-family:"Oswald",sans-serif;}
  .wrap{max-width:760px;margin:0 auto;padding:26px 22px 60px;}
  header{display:flex;align-items:center;gap:14px;margin-bottom:30px;}
  .logo{font-family:"Anton";font-size:2.2rem;letter-spacing:.02em;text-transform:uppercase;line-height:1;}
  .logo b{color:var(--uj-red);font-weight:400;}
  .logo span{color:#fff;font-weight:400;}
  .tag{margin-left:auto;font-size:.7rem;letter-spacing:.35em;text-transform:uppercase;color:var(--muted);}
  .flag{width:46px;height:23px;border:1px solid #000;flex:none;}
  /* poster card */
  .bill{position:relative;border:1px solid var(--line);background:
      repeating-linear-gradient(0deg,#101015,#101015 2px,#0d0d12 2px,#0d0d12 4px);
    padding:28px 26px 30px;overflow:hidden;}
  .kicker{position:relative;text-align:center;font-size:.72rem;letter-spacing:.45em;
    text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
  .venue{position:relative;text-align:center;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:22px;}
  .names{position:relative;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;}
  .fighter{text-align:center;}
  .corner{font-size:.66rem;letter-spacing:.25em;text-transform:uppercase;font-weight:600;}
  .corner.red{color:var(--uj-red);} .corner.blue{color:#5b8be0;}
  .fname{font-family:"Anton";font-size:2.7rem;line-height:.95;text-transform:uppercase;margin:6px 0;}
  .rec{font-size:1.05rem;font-weight:600;color:var(--gold);letter-spacing:.03em;}
  .vs{font-family:"Anton";font-size:1.6rem;color:#fff;opacity:.5;}
  /* tale of the tape */
  .tape{position:relative;margin-top:26px;border-top:1px solid var(--line);}
  .row{display:grid;grid-template-columns:1fr auto 1fr;border-bottom:1px solid var(--line);
    align-items:center;padding:9px 0;}
  .row b{font-size:1.15rem;font-weight:600;}
  .row .lab{text-align:center;font-size:.64rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
  .row .l{text-align:right;padding-right:18px;} .row .r{text-align:left;padding-left:18px;}
  .last5{display:flex;gap:4px;justify-content:flex-end;}
  .last5.r{justify-content:flex-start;}
  .pill{font-size:.6rem;font-weight:700;padding:2px 5px;color:#fff;font-family:"Oswald";}
  .w{background:#2f9e57;} .l{ } .pill.l{background:#c0392b;}
  .foot{margin-top:18px;text-align:center;font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <svg class="flag" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
      <clipPath id="ujclip"><path d="M0,0 v30 h60 v-30 z"/></clipPath>
      <clipPath id="ujcc"><path d="M30,15 h30 v15 zv15 h-30 zh-30 v-15 zv-15 h30 z"/></clipPath>
      <g clip-path="url(#ujclip)">
        <rect width="60" height="30" fill="#012169"/>
        <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
        <path d="M0,0 L60,30 M60,0 L0,30" clip-path="url(#ujcc)" stroke="#cf142b" stroke-width="4"/>
        <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>
        <path d="M30,0 v30 M0,15 h60" stroke="#cf142b" stroke-width="6"/>
      </g>
    </svg>
    <div class="logo"><b>BRIT</b><span>BOXING</span></div>
    <div class="tag">The British Fight Bill</div>
  </header>

  <div class="bill">
    <div class="kicker">★ Heavyweight ★</div>
    <div class="venue">Saturday · The O2, London</div>
    <div class="names">
      <div class="fighter">
        <div class="corner red">Red corner</div>
        <div class="fname">Anthony<br>Joshua</div>
        <div class="rec">29–4 · 26 KO</div>
      </div>
      <div class="vs">VS</div>
      <div class="fighter">
        <div class="corner blue">Blue corner</div>
        <div class="fname">Daniel<br>Dubois</div>
        <div class="rec">23–3 · 22 KO</div>
      </div>
    </div>

    <div class="tape">
      <div class="row"><b class="l">90%</b><span class="lab">KO rate</span><b class="r">96%</b></div>
      <div class="row"><b class="l">6′6″</b><span class="lab">Height</span><b class="r">6′5″</b></div>
      <div class="row"><b class="l">82″</b><span class="lab">Reach</span><b class="r">78″</b></div>
      <div class="row"><b class="l">36</b><span class="lab">Age</span><b class="r">28</b></div>
      <div class="row">
        <div class="last5 l"><span class="pill w">W</span><span class="pill l">L</span><span class="pill w">W</span><span class="pill w">W</span><span class="pill w">W</span></div>
        <span class="lab">Last 5</span>
        <div class="last5 r"><span class="pill w">W</span><span class="pill l">L</span><span class="pill w">W</span><span class="pill w">W</span><span class="pill w">W</span></div>
      </div>
    </div>
    <div class="foot">Records frozen at announcement · Source: Wikipedia</div>
  </div>
</div>
</body>
</html>
